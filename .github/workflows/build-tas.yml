name: Build DDNet TAS

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'src/game/client/components/tas.h'
      - 'src/game/client/components/tas.cpp'
      - 'src/game/client/gameclient.h'
      - 'src/game/client/gameclient.cpp'

jobs:
  # ══════════════════════════════════════════════════════════
  # Windows x64
  # ══════════════════════════════════════════════════════════
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -B release -A x64 -DEXCEPTION_HANDLING=ON -DVULKAN=OFF

      - name: Build DDNet (Release)
        run: cmake --build release --config Release --target package_default

      - name: Find and collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          # Ищем zip с Windows билдом
          find release -name "*-win64.zip" | while read f; do
            cp "$f" artifacts/DDNet-TAS-windows.zip
          done
          # Если zip не нашёлся — ищем .exe напрямую
          if [ ! -f artifacts/DDNet-TAS-windows.zip ]; then
            find release -name "DDNet.exe" | head -1 | while read f; do
              cp "$f" artifacts/DDNet-TAS.exe
            done
          fi
          ls -la artifacts/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DDNet-TAS-windows
          path: artifacts/
          retention-days: 30

  # ══════════════════════════════════════════════════════════
  # Linux x64
  # ══════════════════════════════════════════════════════════
  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build \
            libfreetype6-dev \
            libsdl2-dev \
            libsqlite3-dev \
            libcurl4-openssl-dev \
            libpng-dev \
            libglew-dev \
            libnotify-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev libx264-dev

      - name: Configure CMake
        run: cmake -B release -G Ninja -DCMAKE_BUILD_TYPE=Release -DVULKAN=OFF

      - name: Build DDNet (Release)
        run: cmake --build release --target package_default

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find release -name "*.tar.xz" -o -name "*.AppImage" | head -1 | while read f; do
            cp "$f" artifacts/
          done
          # Fallback — просто бинарник
          if [ -z "$(ls artifacts/)" ]; then
            cp release/DDNet artifacts/DDNet-TAS 2>/dev/null || true
          fi
          ls -la artifacts/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: DDNet-TAS-linux
          path: artifacts/
          retention-days: 30

  # ══════════════════════════════════════════════════════════
  # Итог
  # ══════════════════════════════════════════════════════════
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## DDNet TAS Build" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64   | ${{ needs.build-linux.result }}   |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Скачай артефакты внизу страницы сборки." >> $GITHUB_STEP_SUMMARY
